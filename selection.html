<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module Selection · KCL Maths</title>
<link rel="stylesheet" href="style.css">
<style>
  .course-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    padding: 0 2px;
  }
</style>
</head>
<body>
<div class="site-wrapper">
  <script src="sidebar.js"></script>
  <script>renderSidebar('selection');</script>

  <main class="main">
    <div class="page-header">
      <div class="page-eyebrow">Interactive Map</div>
      <h1 class="page-title">Module Selection</h1>
      <div class="page-subtitle">Click a module to see prerequisites & unlocks · click again while highlighted to open its page</div>
    </div>

    <div class="page-body">
      <div class="pill-nav" id="course-tabs">
        <button class="pill-btn active" data-course="maths">BSc Mathematics</button>
        <button class="pill-btn" data-course="stats">BSc Maths with Statistics</button>
        <button class="pill-btn" data-course="finance">BSc Maths with Finance</button>
        <button class="pill-btn" data-course="phil">BSc Maths & Philosophy</button>
      </div>

      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#EF9F27;border:1.5px solid #BA7517"></div>Selected</div>
        <div class="legend-item"><div class="legend-dot" style="background:#97C459;border:1.5px solid #3B6D11"></div>Prerequisite (first)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#85B7EB;border:1.5px solid #185FA5"></div>Prerequisite (additional)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#F0997B;border:1.5px solid #993C1D"></div>Unlocks</div>
      </div>

      <div class="module-grid" id="grid"></div>
      <div class="relation-hint" id="hint">Click any module to see its relationships</div>
    </div>
  </main>
</div>

<script src="modules-data.js"></script>
<script>
const SEMESTERS = ["Year 1 · Sem 1","Year 1 · Sem 2","Year 2 · Sem 1","Year 2 · Sem 2","Year 3 · Sem 1","Year 3 · Sem 2"];

// Per-course module lists (ids + compulsory flags)
const COURSES = {
  maths: {
    compulsory: new Set(["m1","m2","m3","m4","m5","m6","m7","m8","m9","m10","m11","m15","m16"]),
    ids: ["m1","m2","m3","m4","m5","m6","m7","m8","m9","m10","m11","m12","m13","m14","m15","m16","m17","m18","m19","m20","m21","m22","m26","m27","m28","m29","m30","m31","m32","m33","m34","m35","m36","m37","m38","m39","m40","m41","m42","m43","m44","m45","m46","m47","m48","m49","m50","m51"]
  },
  stats: {
    compulsory: new Set(["m1","m2","m3","m4","m5","m6","m7","m8","m9","m13","m20","m36","m49","m50"]),
    ids: ["m1","m2","m3","m4","m5","m6","m7","m8","m9","m10","m11","m12","m13","m14","m15","m16","m17","m18","m19","m20","m21","m22","m26","m27","m28","m29","m30","m31","m33","m34","m36","m37","m38","m39","m40","m41","m42","m43","m44","m45","m46","m47","m48","m49","m50","m51","m52"]
  },
  finance: {
    compulsory: new Set(["m1","m2","m3","m5","m7","m8","m9","m24","m25","m15","m31","m42"]),
    ids: ["m1","m2","m3","m5","m7","m8","m9","m24","m10","m11","m12","m13","m14","m25","m15","m16","m17","m20","m21","m22","m31","m26","m27","m28","m29","m30","m33","m34","m35","m36","m37","m38","m42","m39","m40","m41","m43","m44","m45","m47","m48","m49","m50","m51","m52"]
  },
  phil: {
    compulsory: new Set(["m1","m2","m3","m5","m7","m9","m24","m25"]),
    ids: ["m1","m2","m3","m5","m7","m9","m24","m10","m12","m14","m25","m15","m16","m18","m19","m21","m23","m26","m27","m28","m30","m31","m33","m34","m35","m37","m38","m39","m40","m41","m42","m43","m44","m45","m46","m47","m48","m51","m52"]
  }
};

let currentCourse = 'maths';
let selected = null;

// Read URL param
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('course') && COURSES[urlParams.get('course')]) {
  currentCourse = urlParams.get('course');
}

function getCourseModules() {
  const course = COURSES[currentCourse];
  return ALL_MODULES.filter(m => course.ids.includes(m.id));
}

function getEnables(id, mods) {
  return mods.filter(m => m.prereqs.includes(id)).map(m => m.id);
}
function getRepeatedEnables(id, mods) {
  return mods.filter(m => m.repeatedPrereqs.includes(id)).map(m => m.id);
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const mods = getCourseModules();
  const course = COURSES[currentCourse];

  let prereqIds = [], repeatedPrereqIds = [], enablesIds = [], repeatedEnablesIds = [];
  if (selected) {
    const sel = mods.find(x => x.id === selected);
    prereqIds         = sel?.prereqs ?? [];
    repeatedPrereqIds = sel?.repeatedPrereqs ?? [];
    enablesIds        = getEnables(selected, mods);
    repeatedEnablesIds = getRepeatedEnables(selected, mods);
  }

  SEMESTERS.forEach((sem, si) => {
    const semMods = mods.filter(m => m.sem === si);
    if (!semMods.length) { grid.appendChild(document.createElement('div')); return; }

    const col = document.createElement('div');
    col.className = 'semester-col';

    const hdr = document.createElement('div');
    hdr.className = 'sem-header';
    hdr.textContent = sem;
    col.appendChild(hdr);

    semMods.forEach(m => {
      const el = document.createElement('div');
      el.className = 'module-card';

      if (selected) {
        if (m.id === selected)                       el.classList.add('selected');
        else if (prereqIds.includes(m.id))           el.classList.add('prereq');
        else if (repeatedPrereqIds.includes(m.id))   el.classList.add('prereq-dup');
        else if (enablesIds.includes(m.id))          el.classList.add('enables');
        else if (repeatedEnablesIds.includes(m.id))  el.classList.add('enables-dup');
      }

      const isComp = course.compulsory.has(m.id);
      el.innerHTML = `
        <div class="mod-code">${m.code}${isComp ? ' ★' : ''}</div>
        <div class="mod-name">${m.name}</div>
      `;

      el.addEventListener('click', () => {
        if (selected === m.id) {
          // Already selected → navigate to module page
          window.location.href = modulePagePath(m.code);
        } else {
          selectModule(m.id, mods);
        }
      });

      col.appendChild(el);
    });

    grid.appendChild(col);
  });
}

function selectModule(id, mods) {
  selected = (selected === id) ? null : id;
  const m = mods ? mods.find(x => x.id === selected) : null;
  const hint = document.getElementById('hint');

  if (!m) {
    hint.textContent = 'Click any module to see its relationships';
  } else {
    const prereqNames = [...new Set(
      m.prereqs.map(pid => ALL_MODULES.find(x => x.id === pid)?.name).filter(Boolean)
    )].join(', ') || 'none';
    const allEnablesIds = [...getEnables(id, mods), ...getRepeatedEnables(id, mods)];
    const enablesNames = [...new Set(
      allEnablesIds.map(eid => ALL_MODULES.find(x => x.id === eid)?.name).filter(Boolean)
    )].join(', ') || 'none';
    hint.innerHTML = `<strong>${m.name}</strong> &nbsp;·&nbsp; requires: ${prereqNames} &nbsp;·&nbsp; unlocks: ${enablesNames} &nbsp;<span style="color:var(--purple)">(click again to open module page)</span>`;
  }

  render();
}

// Course tab switching
document.querySelectorAll('.pill-btn').forEach(btn => {
  if (btn.dataset.course === currentCourse) btn.classList.add('active');
  else btn.classList.remove('active');

  btn.addEventListener('click', () => {
    currentCourse = btn.dataset.course;
    selected = null;
    document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('hint').textContent = 'Click any module to see its relationships';
    render();
  });
});

render();
</script>
</body>
</html>
