<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module Selection · KCL Maths</title>
<link rel="stylesheet" href="style.css">
<style>
  .course-label {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    padding: 0 2px;
  }

</style>
<link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
<div class="site-wrapper">
  <script src="sidebar.js"></script>
  <script>renderSidebar('selection');</script>

  <main class="main">
    <div class="page-header">
      <div class="page-eyebrow">Interactive Map</div>
      <h1 class="page-title">Module Selection</h1>
      <div class="page-subtitle">Click a module to see prerequisites & unlocks · click again while highlighted to open its page</div>
    </div>

    <div class="page-body">
      <div class="pill-nav" id="course-tabs">
        <button class="pill-btn active" data-course="maths">BSc Mathematics</button>
        <button class="pill-btn active" data-course="mmaths">MSci Mathematics</button>
        <button class="pill-btn" data-course="stats">BSc Mathematics with Statistics</button>
        <button class="pill-btn" data-course="finance">BSc Mathematics with Management and Finance</button>
        <button class="pill-btn" data-course="phil">BSc Mathematics & Philosophy</button>
        <button class="pill-btn" data-course="quant">BSc Quantitative Mathematics</button>
      </div>

      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#85B7EB;border:1.5px solid #185FA5"></div>Selected</div>
        <div class="legend-item"><div class="legend-dot" style="background:#97C459;border:1.5px solid #3B6D11"></div>Prerequisite (first sitting)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#EF9F27;border:1.5px solid #BA7517"></div>Prerequisite (second sitting/joint honours)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#F0997B;border:1.5px solid #993C1D"></div>Unlocks</div>
      </div>

      <div class="module-grid" id="grid"></div>
      <div class="relation-hint" id="hint">Click any module to see its relationships</div>
    </div>
  </main>
</div>

<script src="modules-data.js"></script>
<script>
// Sem indices: 0=Y1S1, 1=Y1S2, 2=Y2S1, 3=Y2S2, 4=Y3S1, 5=Y3S2, 6=Y3 Full Year, 7=Y4S1, 8=Y4S2, 9=Y4 Full Year
const SEM_LABELS = {
  0: "Year 1 · Sem 1", 1: "Year 1 · Sem 2",
  2: "Year 2 · Sem 1", 3: "Year 2 · Sem 2",
  4: "Year 3 · Sem 1", 5: "Year 3 · Sem 2",
  7: "Year 4 · Sem 1", 8: "Year 4 · Sem 2"
};

// Per-course module lists (ids + compulsory flags)
const COURSES = {
  maths: {
    compulsory: new Set(["m1","m2","m3","m4","m5","m6","m7","m8","m9","m10","m11","m15","m16"]),
    ids: ["m1","m2","m3","m4","m5","m6","m7","m8","m9","m10","m11","m12","m13","m14","m15","m16","m17","m18","m19","m20","m21","m22","m26","m27","m28","m29","m30","m31","m32","m33","m34","m35","m36","m37","m38","m39","m40","m41","m42","m43","m44","m45","m46","m47","m48","m49","m50","m51","m100"]
  },
  mmaths: {
    compulsory: new Set(["m1","m2","m3","m4","m5","m6","m7","m8","m9","m10","m11","m15","m16","m101"]),
    ids: ["m1","m2","m3","m4","m5","m6","m7","m8","m9","m10","m11","m12","m13","m14","m15","m16","m17","m18","m19","m20","m21","m22","m26","m27","m28","m29","m30","m31","m32","m33","m34","m35","m36","m37","m38","m39","m40","m41","m42","m43","m44","m45","m46","m47","m48","m49","m50","m51","m100","m53","m54","m55","m56","m67","m57","m58","m59","m60","m61","m62","m63","m64","m65","m79","m80","m81","m82","m83","m84","m85","m87","m88","m89","m90","m91","m93","m94","m96","m97","m98","m99","m101"]
  },
  stats: {
    compulsory: new Set(["m1","m2","m3","m4","m5","m6","m7","m8","m9","m13","m20","m36","m49","m50"]),
    ids: ["m1","m2","m3","m4","m5","m6","m7","m8","m9","m10","m11","m12","m13","m14","m15","m16","m17","m18","m19","m20","m21","m22","m26","m27","m28","m29","m30","m31","m33","m34","m36","m37","m38","m39","m40","m41","m42","m43","m44","m45","m46","m47","m48","m49","m50","m51","m52","m100"]
  },
  finance: {
    compulsory: new Set(["m1","m2","m3","m5","m7","m8","m9","m24","m25","m15","m31","m42"]),
    ids: ["m1","m2","m3","m5","m7","m8","m9","m24","m10","m11","m12","m13","m14","m25","m15","m16","m17","m20","m21","m22","m31","m26","m27","m28","m29","m30","m33","m34","m35","m36","m37","m38","m42","m39","m40","m41","m43","m44","m45","m47","m48","m49","m50","m51","m52","m100"]
  },
  phil: {
    compulsory: new Set(["m1","m2","m3","m5","m7","m9","m24","m25"]),
    ids: ["m1","m2","m3","m5","m7","m9","m24","m10","m12","m14","m25","m15","m16","m18","m19","m21","m23","m26","m27","m28","m30","m31","m33","m34","m35","m37","m38","m39","m40","m41","m42","m43","m44","m45","m46","m47","m48","m51","m52","m100"]
  }
};

let currentCourse = 'maths';
let selected = null;

// Read URL param
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('course') && COURSES[urlParams.get('course')]) {
  currentCourse = urlParams.get('course');
}

function getCourseModules() {
  const course = COURSES[currentCourse];
  return ALL_MODULES.filter(m => course.ids.includes(m.id));
}

function getEnables(id, mods) {
  return mods.filter(m => m.prereqs.includes(id)).map(m => m.id);
}
function getRepeatedEnables(id, mods) {
  return mods.filter(m => m.repeatedPrereqs.includes(id)).map(m => m.id);
}

function buildModuleCard(m, course, prereqIds, repeatedPrereqIds, enablesIds, repeatedEnablesIds) {
  const el = document.createElement('div');
  el.className = 'module-card';
  if (selected) {
    if (m.id === selected)                       el.classList.add('selected');
    else if (prereqIds.includes(m.id))           el.classList.add('prereq');
    else if (repeatedPrereqIds.includes(m.id))   el.classList.add('prereq-dup');
    else if (enablesIds.includes(m.id))          el.classList.add('enables');
    else if (repeatedEnablesIds.includes(m.id))  el.classList.add('enables-dup');
  }

  const isComp = course.compulsory.has(m.id);
  el.innerHTML = `
    <div class="mod-code">${m.code}${isComp ? ' ★' : ''}</div>
    <div class="mod-name">${m.name}</div>
  `;

  el.addEventListener('click', () => {
    if (selected === m.id) {
      window.location.href = modulePagePath(m.code);
    } else {
      selectModule(m.id, getCourseModules());
    }
  });
  return el;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const mods = getCourseModules();
  const course = COURSES[currentCourse];
  const hasYear4 = currentCourse === 'mmaths';

  let prereqIds = [], repeatedPrereqIds = [], enablesIds = [], repeatedEnablesIds = [];
  if (selected) {
    const sel = mods.find(x => x.id === selected);
    prereqIds         = sel?.prereqs ?? [];
    repeatedPrereqIds = sel?.repeatedPrereqs ?? [];
    enablesIds        = getEnables(selected, mods);
    repeatedEnablesIds = getRepeatedEnables(selected, mods);
  }

  function sortMods(modList) {
    return [...modList].sort((a, b) => {
      const ac = course.compulsory.has(a.id) ? 0 : 1;
      const bc = course.compulsory.has(b.id) ? 0 : 1;
      return ac - bc;
    });
  }

  // Year groups: each has two semester indices and an optional full-year sem index
  const yearGroups = [
    { sems: [0, 1] },
    { sems: [2, 3] },
    { sems: [4, 5], fullYear: 6 },
    ...(hasYear4 ? [{ sems: [7, 8], fullYear: 9 }] : [])
  ];

  // Each year group gets its own 2-column sub-grid wrapper so full-year
  // cards sit at the top of that group and only stretch to their natural height.
  grid.style.gridTemplateColumns = `repeat(${yearGroups.length}, 1fr 1fr)`;

  yearGroups.forEach(({ sems, fullYear }) => {
    const fyMods = fullYear !== undefined ? sortMods(mods.filter(m => m.sem === fullYear)) : [];

    const wrapper = document.createElement('div');
    wrapper.className = 'year-group';
    wrapper.style.cssText = 'display:grid; grid-template-columns:1fr 1fr; column-gap:10px; row-gap:8px; grid-column:span 2; align-items:start;';

    if (!fyMods.length) {
      // Years 1 & 2: no full-year modules — simple flex columns, no gaps
      sems.forEach(semIdx => {
        const col = document.createElement('div');
        col.className = 'semester-col';
        const hdr = document.createElement('div');
        hdr.className = 'sem-header';
        hdr.textContent = SEM_LABELS[semIdx];
        col.appendChild(hdr);
        sortMods(mods.filter(m => m.sem === semIdx)).forEach(m => {
          col.appendChild(buildModuleCard(m, course, prereqIds, repeatedPrereqIds, enablesIds, repeatedEnablesIds));
        });
        wrapper.appendChild(col);
      });
    } else {
      // Years 3 & 4: has full-year modules.
      //
      // fyAtTop  = true  → maths/mmaths/phil/Y4: no compulsory mods in this year block,
      //                     project leads; flex columns used so no gaps.
      // fyAtTop  = false → stats/finance Y3: project must sit after compulsory mods in
      //                     both columns; slot-based grid placement used to interleave it.
      const sem1CompCount = mods.filter(m => m.sem === sems[0] && course.compulsory.has(m.id)).length;
      const sem2CompCount = mods.filter(m => m.sem === sems[1] && course.compulsory.has(m.id)).length;
      const fyAllComp = fyMods.every(m => course.compulsory.has(m.id));
      const fyAtTop   = fyAllComp || (sem1CompCount === 0 && sem2CompCount === 0);

      if (fyAtTop) {
        // Switch wrapper to flex-column so rows stack tightly with no grid gaps.
        // Structure: hdrRow (2 headers side by side) → fyRow (spanning) → cardsRow (2 cols).
        wrapper.style.cssText = 'display:flex; flex-direction:column; gap:8px; grid-column:span 2;';

        // Row 1: the two semester headers side by side
        const hdrRow = document.createElement('div');
        hdrRow.style.cssText = 'display:grid; grid-template-columns:1fr 1fr; column-gap:10px;';
        sems.forEach(semIdx => {
          const hdr = document.createElement('div');
          hdr.className = 'sem-header';
          hdr.textContent = SEM_LABELS[semIdx];
          hdrRow.appendChild(hdr);
        });
        wrapper.appendChild(hdrRow);

        // Row 2: full-year spanning card
        const fyRow = document.createElement('div');
        fyRow.style.cssText = 'display:flex; flex-direction:column; gap:8px;';
        fyMods.forEach(m => {
          fyRow.appendChild(buildModuleCard(m, course, prereqIds, repeatedPrereqIds, enablesIds, repeatedEnablesIds));
        });
        wrapper.appendChild(fyRow);

        // Row 3+: the two semester card-columns side by side (no header, already rendered)
        const cardsRow = document.createElement('div');
        cardsRow.style.cssText = 'display:grid; grid-template-columns:1fr 1fr; column-gap:10px; row-gap:8px; align-items:start;';
        sems.forEach(semIdx => {
          const col = document.createElement('div');
          col.className = 'semester-col';
          sortMods(mods.filter(m => m.sem === semIdx)).forEach(m => {
            col.appendChild(buildModuleCard(m, course, prereqIds, repeatedPrereqIds, enablesIds, repeatedEnablesIds));
          });
          cardsRow.appendChild(col);
        });
        wrapper.appendChild(cardsRow);
      } else {
        // stats/finance: project must appear after compulsory mods in both columns.
        // Use explicit CSS grid placement so the spanning row can be injected mid-stream.
        const fySlot = Math.max(sem1CompCount, sem2CompCount);

        sems.forEach((semIdx, colIdx) => {
          const hdr = document.createElement('div');
          hdr.className = 'sem-header';
          hdr.textContent = SEM_LABELS[semIdx];
          hdr.style.gridColumn = String(colIdx + 1);
          wrapper.appendChild(hdr);
        });

        const colMods  = sems.map(semIdx => sortMods(mods.filter(m => m.sem === semIdx)));
        const maxSlots = Math.max(colMods[0].length, colMods[1].length);
        let fyInjected = false;

        for (let slot = 0; slot <= maxSlots; slot++) {
          if (!fyInjected && slot === fySlot) {
            fyInjected = true;
            const fyRow = document.createElement('div');
            fyRow.style.cssText = 'grid-column:1 / -1; display:flex; flex-direction:column; gap:8px;';
            fyMods.forEach(m => {
              fyRow.appendChild(buildModuleCard(m, course, prereqIds, repeatedPrereqIds, enablesIds, repeatedEnablesIds));
            });
            wrapper.appendChild(fyRow);
          }
          colMods.forEach((mList, colIdx) => {
            if (slot < mList.length) {
              const cardEl = buildModuleCard(mList[slot], course, prereqIds, repeatedPrereqIds, enablesIds, repeatedEnablesIds);
              cardEl.style.gridColumn = String(colIdx + 1);
              wrapper.appendChild(cardEl);
            }
          });
          if (slot >= maxSlots) break;
        }
        if (!fyInjected) {
          const fyRow = document.createElement('div');
          fyRow.style.cssText = 'grid-column:1 / -1; display:flex; flex-direction:column; gap:8px;';
          fyMods.forEach(m => {
            fyRow.appendChild(buildModuleCard(m, course, prereqIds, repeatedPrereqIds, enablesIds, repeatedEnablesIds));
          });
          wrapper.appendChild(fyRow);
        }
      }
    }

    grid.appendChild(wrapper);
  });
}

function selectModule(id, mods) {
  selected = (selected === id) ? null : id;
  const m = mods ? mods.find(x => x.id === selected) : null;
  const hint = document.getElementById('hint');

  if (!m) {
    hint.textContent = 'Click any module to see its relationships';
  } else {
    const prereqNames = [...new Set(
      m.prereqs.map(pid => ALL_MODULES.find(x => x.id === pid)?.name).filter(Boolean)
    )].join(', ') || 'none';
    const allEnablesIds = [...getEnables(id, mods), ...getRepeatedEnables(id, mods)];
    const enablesNames = [...new Set(
      allEnablesIds.map(eid => ALL_MODULES.find(x => x.id === eid)?.name).filter(Boolean)
    )].join(', ') || 'none';
    hint.innerHTML = `<strong>${m.name}</strong> &nbsp;·&nbsp; requires: ${prereqNames} &nbsp;·&nbsp; unlocks: ${enablesNames} &nbsp;<span style="color:var(--purple)">(click again to open module page)</span>`;
  }

  render();
}

// Course tab switching
document.querySelectorAll('.pill-btn').forEach(btn => {
  if (btn.dataset.course === currentCourse) btn.classList.add('active');
  else btn.classList.remove('active');

  btn.addEventListener('click', () => {
    currentCourse = btn.dataset.course;
    selected = null;
    document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('hint').textContent = 'Click any module to see its relationships';
    render();
  });
});

render();
</script>
</body>
</html>
