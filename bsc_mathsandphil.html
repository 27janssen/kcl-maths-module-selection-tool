<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSc Mathematics & Philosophy</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fff; color: #111; padding: 1.5rem; }
.nav { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 1.5rem; border-bottom: 1px solid #e5e5e5; padding-bottom: 1rem; }
.nav-btn { font-size: 12px; padding: 6px 12px; border: 0.5px solid #ccc; border-radius: 8px; background: transparent; color: #555; cursor: pointer; text-decoration: none; transition: background 0.1s, color 0.1s; }
.nav-btn:hover { background: #f5f5f5; color: #111; }
.nav-btn.active { background: #f5f5f5; color: #111; border-color: #999; font-weight: 500; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 10px; }
.semester { display: flex; flex-direction: column; gap: 8px; }
.sem-header { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 6px; border-bottom: 0.5px solid #e5e5e5; text-align: center; line-height: 1.3; }
.module { border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 10px 8px; cursor: pointer; background: #fff; transition: border-color 0.15s, transform 0.1s; user-select: none; }
.module:hover { border-color: #bbb; transform: translateY(-1px); }
.module.selected    { background: #FAEEDA; border-color: #BA7517; }
.module.prereq      { background: #EAF3DE; border-color: #3B6D11; }
.module.enables     { background: #FAECE7; border-color: #993C1D; }
.module.prereq-dup  { background: #EAF3DE; border-color: #3B6D11; }
.module.enables-dup { background: #FAECE7; border-color: #993C1D; }
.mod-code { font-size: 10px; font-weight: 500; color: #888; letter-spacing: 0.04em; margin-bottom: 3px; }
.module.selected    .mod-code { color: #854F0B; }
.module.prereq      .mod-code { color: #3B6D11; }
.module.enables     .mod-code { color: #993C1D; }
.module.prereq-dup  .mod-code { color: #3B6D11; }
.module.enables-dup .mod-code { color: #993C1D; }
.mod-name { font-size: 12px; color: #111; line-height: 1.3; }
.module.selected    .mod-name { color: #633806; }
.module.prereq      .mod-name { color: #27500A; }
.module.enables     .mod-name { color: #712B13; }
.module.prereq-dup  .mod-name { color: #27500A; }
.module.enables-dup .mod-name { color: #712B13; }
.hint { font-size: 12px; color: #aaa; text-align: center; margin-top: 1rem; }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-btn" href="index.html">All Courses</a>
  <a class="nav-btn" href="bsc_mathematics.html">BSc Mathematics</a>
  <a class="nav-btn" href="bsc_mathswithstats.html">BSc Mathematics with Statistics</a>
  <a class="nav-btn" href="bsc_mathswithfinance.html">BSc Mathematics with Management and Finance</a>
  <a class="nav-btn active" href="bsc_mathsandphil.html">BSc Mathematics and Philosophy</a>
</nav>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#EF9F27;border:1.5px solid #BA7517"></div>Selected</div>
  <div class="legend-item"><div class="legend-dot" style="background:#97C459;border:1.5px solid #3B6D11"></div>Prerequisite</div>
  <div class="legend-item"><div class="legend-dot" style="background:#F0997B;border:1.5px solid #993C1D"></div>Unlocks</div>
</div>

<div class="grid" id="grid"></div>
<p class="hint" id="hint">Click any module to see its relationships</p>

<script>
const SEMESTERS = ["Year 1 Semester 1","Year 1 Semester 2","Year 2 Semester 1","Year 2 Semester 2","Year 3 Semester 1","Year 3 Semester 2"];

const modules = [
  {id:"m1",  code:"4CCM111A (Compulsory)", name:"Calculus I",                                             sem:0, prereqs:[], repeatedPrereqs:[]},
  {id:"m2",  code:"4CCM113A (Compulsory)", name:"Linear Algebra & Geometry I",                            sem:0, prereqs:[], repeatedPrereqs:[]},
  {id:"m3",  code:"4CCM115A (Compulsory)", name:"Sequences & Series",                                     sem:0, prereqs:[], repeatedPrereqs:[]},
  {id:"m5",  code:"4CCM112A (Compulsory)", name:"Calculus II",                                            sem:1, prereqs:["m1"], repeatedPrereqs:[]},
  {id:"m7",  code:"4CCM131A (Compulsory)", name:"Introduction to Dynamical Systems",                      sem:1, prereqs:["m1","m2"], repeatedPrereqs:[]},
  {id:"m9",  code:"5CCM221A (Compulsory)", name:"Real Analysis",                                          sem:2, prereqs:["m1","m3"], repeatedPrereqs:[]},
  {id:"m24", code:"5CCM121B (Compulsory)", name:"Introduction to Algebra",                                sem:2, prereqs:[], repeatedPrereqs:[]},
  {id:"m10", code:"5CCM231A", name:"Classical Dynamics",                                     sem:2, prereqs:["m7"], repeatedPrereqs:[]},
  {id:"m12", code:"5CCM224A", name:"Introduction to Number Theory",                          sem:2, prereqs:["m4"], repeatedPrereqs:["m24"]},
  {id:"m14", code:"5CCM376A", name:"Random Structures & Algorithms",                         sem:2, prereqs:[], repeatedPrereqs:[]},
  {id:"m25", code:"5CCM114B (Compulsory)", name:"Linear Algebra & Geometry II",                           sem:3, prereqs:["m2"], repeatedPrereqs:[]},
  {id:"m15", code:"5CCM211A", name:"Applied Differential Equations",                         sem:3, prereqs:["m5","m9"], repeatedPrereqs:[]},
  {id:"m16", code:"5CCM212A", name:"Complex Analysis",                                       sem:3, prereqs:["m5","m9"], repeatedPrereqs:[]},
  {id:"m18", code:"5CCM223A", name:"Geometry of Surfaces",                                   sem:3, prereqs:["m1","m2","m5","m7"], repeatedPrereqs:["m25"]},
  {id:"m19", code:"5CCM234A", name:"Introductory Quantum Theory",                            sem:3, prereqs:["m5","m6"], repeatedPrereqs:["m25"]},
  {id:"m21", code:"5CCM251A", name:"Discrete Mathematics",                                   sem:3, prereqs:[], repeatedPrereqs:[]},
  {id:"m23", code:"5CCM141B", name:"Probability & Statistics I",                             sem:3, prereqs:[], repeatedPrereqs:[]},
  {id:"m26", code:"6CCM314A", name:"Mathematical Foundations for Complex Systems Modelling", sem:4, prereqs:["m8","m1","m5","m9"], repeatedPrereqs:["m23"]},
  {id:"m27", code:"6CCM226B", name:"Metric Spaces & Topology",                               sem:4, prereqs:["m9"], repeatedPrereqs:[]},
  {id:"m28", code:"6CCM331A", name:"Special Relativity and Electromagnetism",                sem:4, prereqs:["m5","m15","m11"], repeatedPrereqs:[]},
  {id:"m30", code:"6CCM350A", name:"Rings & Modules",                                        sem:4, prereqs:["m4","m6"], repeatedPrereqs:["m24","m25"]},
  {id:"m31", code:"6CCM388A", name:"Mathematical Finance I",                                 sem:4, prereqs:["m8"], repeatedPrereqs:["m23"]},
  {id:"m33", code:"6CCMCS02", name:"Theory of Complex Networks",                             sem:4, prereqs:["m5","m6","m8"], repeatedPrereqs:["m23","m25"]},
  {id:"m34", code:"6CCM224B", name:"Introduction to Number Theory",                          sem:4, prereqs:["m4"], repeatedPrereqs:["m24"]},
  {id:"m35", code:"6CCM241B", name:"Probability & Statistics II",                            sem:4, prereqs:["m8"], repeatedPrereqs:["m23"]},
  {id:"m37", code:"6CCM359A", name:"Numerical & Computational Methods with Python",          sem:4, prereqs:[], repeatedPrereqs:[]},
  {id:"m38", code:"6CCM376B", name:"Random Structures & Algorithms",                         sem:4, prereqs:[], repeatedPrereqs:[]},
  {id:"m39", code:"6CCM318A", name:"Fourier Analysis",                                       sem:5, prereqs:["m9"], repeatedPrereqs:[]},
  {id:"m40", code:"6CCM326A", name:"Galois Theory",                                          sem:5, prereqs:["m30"], repeatedPrereqs:[]},
  {id:"m41", code:"6CCM334A", name:"Space-Time Geometry and General Relativity",             sem:5, prereqs:["m28"], repeatedPrereqs:[]},
  {id:"m42", code:"6CCM338A", name:"Mathematical Finance II",                                sem:5, prereqs:["m8","m13","m31"], repeatedPrereqs:["m23","m35"]},
  {id:"m43", code:"6CCM351A", name:"Representation Theory of Finite Groups",                 sem:5, prereqs:["m11"], repeatedPrereqs:[]},
  {id:"m44", code:"6CCMCS05", name:"Mathematical Biology",                                   sem:5, prereqs:["m7","m8"], repeatedPrereqs:["m23"]},
  {id:"m45", code:"6CCM223B", name:"Geometry of Surfaces",                                   sem:5, prereqs:["m1","m2","m6","m5","m7"], repeatedPrereqs:["m25"]},
  {id:"m46", code:"6CCM327A", name:"Geometric Topology",                                     sem:5, prereqs:["m27","m18"], repeatedPrereqs:[]},
  {id:"m47", code:"6CCM242B", name:"Statistical Modelling",                                  sem:5, prereqs:["m13"], repeatedPrereqs:["m35"]},
  {id:"m48", code:"6CCM242B", name:"Introductory Quantum Theory",                            sem:5, prereqs:["m5","m6"], repeatedPrereqs:["m25"]},
  {id:"m51", code:"6CCM377B", name:"Applied Probability Models",                             sem:5, prereqs:["m8"], repeatedPrereqs:["m23"]},
  {id:"m52", code:"6CCM212B", name:"Complex Analysis",                                       sem:5, prereqs:["m9","m5"], repeatedPrereqs:[]},
];

let selected = null;

function getEnables(id) {
  return modules.filter(m => m.prereqs.includes(id)).map(m => m.id);
}
function getRepeatedEnables(id) {
  return modules.filter(m => m.repeatedPrereqs.includes(id)).map(m => m.id);
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let prereqIds = [], repeatedPrereqIds = [], enablesIds = [], repeatedEnablesIds = [];
  if (selected) {
    const sel = modules.find(x => x.id === selected);
    prereqIds          = sel?.prereqs ?? [];
    repeatedPrereqIds  = sel?.repeatedPrereqs ?? [];
    enablesIds         = getEnables(selected);
    repeatedEnablesIds = getRepeatedEnables(selected);
  }

  SEMESTERS.forEach((sem, si) => {
    const col = document.createElement("div");
    col.className = "semester";
    const hdr = document.createElement("div");
    hdr.className = "sem-header";
    hdr.textContent = sem;
    col.appendChild(hdr);

    modules.filter(m => m.sem === si).forEach(m => {
      const el = document.createElement("div");
      el.className = "module";
      if (selected) {
        if (m.id === selected)                      el.classList.add("selected");
        else if (prereqIds.includes(m.id))          el.classList.add("prereq");
        else if (repeatedPrereqIds.includes(m.id))  el.classList.add("prereq-dup");
        else if (enablesIds.includes(m.id))         el.classList.add("enables");
        else if (repeatedEnablesIds.includes(m.id)) el.classList.add("enables-dup");
      }
      el.innerHTML = `<div class="mod-code">${m.code}</div><div class="mod-name">${m.name}</div>`;
      el.addEventListener("click", () => selectModule(m.id));
      col.appendChild(el);
    });
    grid.appendChild(col);
  });
}

function selectModule(id) {
  selected = (selected === id) ? null : id;
  const m = modules.find(x => x.id === selected);
  const hint = document.getElementById("hint");
  if (!m) {
    hint.textContent = "Click any module to see its relationships";
  } else {
    const prereqNames = [...new Set(
      m.prereqs.map(pid => modules.find(x => x.id === pid)?.name).filter(Boolean)
    )].join(", ") || "none";
    const allEnablesIds = [...getEnables(id), ...getRepeatedEnables(id)];
    const enablesNames = [...new Set(
      allEnablesIds.map(eid => modules.find(x => x.id === eid)?.name).filter(Boolean)
    )].join(", ") || "none";
    hint.textContent = `${m.name}: requires ${prereqNames} · unlocks ${enablesNames}`;
  }
  render();
}

render();
</script>
</body>
</html>
