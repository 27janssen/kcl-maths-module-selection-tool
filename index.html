
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.app { padding: 1rem 0; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--color-text-secondary); }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 10px; }
.semester { display: flex; flex-direction: column; gap: 8px; }
.sem-header { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 6px; border-bottom: 0.5px solid var(--color-border-tertiary); text-align: center; line-height: 1.3; }
.module { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 8px; cursor: pointer; background: var(--color-background-primary); transition: border-color 0.15s, transform 0.1s; user-select: none; }
.module:hover { border-color: var(--color-border-secondary); transform: translateY(-1px); }
.module.selected { background: #FAEEDA; border-color: #BA7517; }
.module.prereq   { background: #EAF3DE; border-color: #3B6D11; }
.module.enables  { background: #FAECE7; border-color: #993C1D; }
.mod-code { font-size: 10px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.04em; margin-bottom: 3px; }
.module.selected .mod-code { color: #854F0B; }
.module.prereq   .mod-code { color: #3B6D11; }
.module.enables  .mod-code { color: #993C1D; }
.mod-name { font-size: 12px; color: var(--color-text-primary); line-height: 1.3; }
.module.selected .mod-name { color: #633806; }
.module.prereq   .mod-name { color: #27500A; }
.module.enables  .mod-name { color: #712B13; }
.hint { font-size: 12px; color: var(--color-text-tertiary); text-align: center; margin-top: 1rem; }
</style>

<div class="app">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#EF9F27;border:1.5px solid #BA7517"></div>Selected</div>
    <div class="legend-item"><div class="legend-dot" style="background:#97C459;border:1.5px solid #3B6D11"></div>Prerequisites</div>
    <div class="legend-item"><div class="legend-dot" style="background:#F0997B;border:1.5px solid #993C1D"></div>Unlocks</div>
  </div>
  <div class="grid" id="grid"></div>
  <p class="hint" id="hint">Click any module to see its relationships</p>
</div>

<script>
const SEMESTERS = ["Year 1 S1","Year 1 S2","Year 2 S1","Year 2 S2","Year 3 S1","Year 3 S2"];

const modules = [
  {id:"m1",  code:"4CCM111A", name:"Calculus I",   sem:0, prereqs:[]},
  {id:"m2",  code:"4CCM113A", name:"Linear Algebra & Geometry I",             sem:0, prereqs:[]},
  {id:"m3",  code:"4CCM115A", name:"Sequences & Series",        sem:0, prereqs:[]},
  {id:"m4",  code:"4AANA003", name:"Introduction to Algebra",            sem:0, prereqs:[]},
  {id:"m5",  code:"4AANA003", name:"Calculus II",            sem:1, prereqs:["m1"]},
  {id:"m6",  code:"4AANA003", name:"Linear Algebra & Geometry II",            sem:1, prereqs:["m2"]},
  {id:"m7",  code:"4AANA003", name:"Introduction to Dynamical Systems",            sem:1, prereqs:["m1","m2"]},
  {id:"m8",  code:"4AANA003", name:"Probability & Statistics I",            sem:1, prereqs:[]},
  {id:"m9",  code:"4AANA003", name:"Real Analysis",            sem:2, prereqs:[]},
  {id:"m10",  code:"4AANA003", name:"Classical Dynamics",            sem:2, prereqs:["m7"]},
  {id:"m11",  code:"4AANA003", name:"Groups and Symmetries",            sem:2, prereqs:[]},
  {id:"m12",  code:"4AANA003", name:"Introduction to Number Theory",            sem:2, prereqs:["m4","m24"]},
  {id:"m13",  code:"4AANA003", name:"Probability & Statistics II",            sem:2, prereqs:["m8"]},
  {id:"m14",  code:"4AANA003", name:"Random Structures & Algorithms",            sem:2, prereqs:[]},
  {id:"m15",  code:"4AANA003", name:"Applied Differential Equations",            sem:3, prereqs:["m5","m9"]},
  {id:"m16",  code:"4AANA003", name:"Complex Analysis",            sem:3, prereqs:["m5","m9"]},
  {id:"m17",  code:"4AANA003", name:"Computational Methods for Mathematics",            sem:3, prereqs:[]},
  {id:"m18",  code:"4AANA003", name:"Geometry of Surfaces",            sem:3, prereqs:["m1","m2","m6","m25","m5","m7"]},
  {id:"m19",  code:"4AANA003", name:"Introductory Quantum Theory",            sem:3, prereqs:["m5","m25","m6","m15"]},
  {id:"m20",  code:"4AANA003", name:"Statistical Modelling",            sem:3, prereqs:["m13"]},
  {id:"m21",  code:"4AANA003", name:"Discrete Mathematics",            sem:3, prereqs:[]},
  {id:"m22",  code:"4AANA003", name:"Applied Probability Models",            sem:3, prereqs:["m8"]},
  {id:"m23",  code:"4AANA003", name:"Probability & Statistics I for Joint Honours",            sem:3, prereqs:[]},
  {id:"m24",  code:"4AANA003", name:"Introduction to Algebra",            sem:2, prereqs:[]},
  {id:"m25",  code:"4AANA003", name:"Linear Algebra & Geometry II",            sem:3, prereqs:["m2"]},
];

let selected = null;

function getEnables(id) {
  return modules.filter(m => m.prereqs.includes(id)).map(m => m.id);
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  SEMESTERS.forEach((sem, si) => {
    const col = document.createElement("div");
    col.className = "semester";
    const hdr = document.createElement("div");
    hdr.className = "sem-header";
    hdr.textContent = sem;
    col.appendChild(hdr);
    modules.filter(m => m.sem === si).forEach(m => {
      const el = document.createElement("div");
      el.className = "module";
      if (selected) {
        const sel = modules.find(x => x.id === selected);
        if (m.id === selected) el.classList.add("selected");
        else if (sel && sel.prereqs.includes(m.id)) el.classList.add("prereq");
        else if (getEnables(selected).includes(m.id)) el.classList.add("enables");
      }
      el.innerHTML = `<div class="mod-code">${m.code}</div><div class="mod-name">${m.name}</div>`;
      el.addEventListener("click", () => selectModule(m.id));
      col.appendChild(el);
    });
    grid.appendChild(col);
  });
}

function selectModule(id) {
  selected = (selected === id) ? null : id;
  const m = modules.find(x => x.id === selected);
  const hint = document.getElementById("hint");
  if (!m) {
    hint.textContent = "Click any module to see its relationships";
  } else {
    const prereqNames = m.prereqs.map(pid => modules.find(x=>x.id===pid)?.code).filter(Boolean).join(", ") || "none";
    const enablesNames = getEnables(id).map(eid => modules.find(x=>x.id===eid)?.code).filter(Boolean).join(", ") || "none";
    hint.textContent = `${m.code}: requires ${prereqNames} · unlocks ${enablesNames}`;
  }
  render();
}

render();
</script>
